<!-- PM Schedule — SD-SP-ENG02-02 PM Plan view -->
<section class="pms-page">
    <header class="page-header">
        <div class="page-header-inner">
            <h1 class="page-title">PM Schedule <span class="title-th">แผนการบำรุงรักษาเครื่องจักร / อุปกรณ์</span></h1>
            <p class="page-subtitle">SD-SP-ENG02-02 — PM plan per machine group. Pick a group (or all), then Print to generate the PDF.</p>
        </div>
    </header>

    <div class="pms-toolbar">
        <div class="pms-controls">
            <label class="pms-lbl">กลุ่มเครื่องจักร / Machine group</label>
            <select id="pms-group" class="filter-select pms-group-select">
                <option value="__all">Loading…</option>
            </select>
            <input type="search" id="pms-search" placeholder="Search group / asset code…" class="filter-input" />
            <button class="btn-print-bulk" id="pms-print">🖨️ Print / Save as PDF</button>
        </div>
        <p class="pms-count-note" id="pms-count"></p>
    </div>

    <div class="pms-stage" id="pms-stage">
        <p class="pms-empty">Loading PM plan…</p>
    </div>
</section>
